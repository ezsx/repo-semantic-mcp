name: repo-semantic-search

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: repo-semantic-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_repo_semantic_data:/qdrant/storage
    ports:
      - "${SEMANTIC_MCP_QDRANT_PORT:-6333}:6333"

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    container_name: repo-semantic-tei
    restart: unless-stopped
    command:
      - "--model-id"
      - "${SEMANTIC_MCP_TEI_MODEL_ID:-intfloat/multilingual-e5-small}"
      - "--port"
      - "80"
    volumes:
      - tei_repo_semantic_cache:/data
    environment:
      HF_HOME: /data
      HUGGINGFACE_HUB_CACHE: /data
    ports:
      - "${SEMANTIC_MCP_TEI_PORT:-8081}:80"

  repo-semantic-mcp:
    build:
      context: ../..
      dockerfile: apps/repo-semantic-mcp/Dockerfile
    container_name: repo-semantic-mcp
    restart: unless-stopped
    depends_on:
      - qdrant
      - tei
    volumes:
      - "${SEMANTIC_MCP_TARGET_REPO_PATH:-../..}:/target_repo"
    environment:
      PYTHONPATH: /repo:/repo/libs
      SEMANTIC_MCP_REPO_ROOT: "${SEMANTIC_MCP_REPO_ROOT:-/target_repo}"
      SEMANTIC_MCP_QDRANT_URL: http://qdrant:6333
      SEMANTIC_MCP_COLLECTION_PREFIX: "${SEMANTIC_MCP_COLLECTION_PREFIX:-repo_semantic}"
      SEMANTIC_MCP_INDEX_SCHEMA_VERSION: "${SEMANTIC_MCP_INDEX_SCHEMA_VERSION:-1}"
      SEMANTIC_MCP_EMBEDDING_BACKEND: "${SEMANTIC_MCP_EMBEDDING_BACKEND:-tei_http}"
      SEMANTIC_MCP_EMBEDDING_MODEL: "${SEMANTIC_MCP_EMBEDDING_MODEL:-intfloat/multilingual-e5-small}"
      SEMANTIC_MCP_PROFILE_NAME: "${SEMANTIC_MCP_PROFILE_NAME:-cpu_e5}"
      SEMANTIC_MCP_QUERY_TEMPLATE: "${SEMANTIC_MCP_QUERY_TEMPLATE:-query: {query}}"
      SEMANTIC_MCP_DOCUMENT_PREFIX: "${SEMANTIC_MCP_DOCUMENT_PREFIX-passage: }"
      SEMANTIC_MCP_TEI_URL: "${SEMANTIC_MCP_TEI_URL:-http://tei:80}"
      SEMANTIC_MCP_TEI_QUERY_PROMPT_NAME: "${SEMANTIC_MCP_TEI_QUERY_PROMPT_NAME-}"
      SEMANTIC_MCP_TEI_DOCUMENT_PROMPT_NAME: "${SEMANTIC_MCP_TEI_DOCUMENT_PROMPT_NAME-}"
      SEMANTIC_MCP_TRANSPORT: "${SEMANTIC_MCP_TRANSPORT:-http}"
      SEMANTIC_MCP_HTTP_HOST: 0.0.0.0
      SEMANTIC_MCP_HTTP_PORT: "${SEMANTIC_MCP_HTTP_PORT:-8011}"
      SEMANTIC_MCP_WATCH_ENABLED: "${SEMANTIC_MCP_WATCH_ENABLED:-1}"
      SEMANTIC_MCP_WATCH_DEBOUNCE_SEC: "${SEMANTIC_MCP_WATCH_DEBOUNCE_SEC:-3}"
      SEMANTIC_MCP_AUTO_INDEX_ON_START: "${SEMANTIC_MCP_AUTO_INDEX_ON_START:-1}"
      SEMANTIC_MCP_EMBED_BATCH_DOCS: "${SEMANTIC_MCP_EMBED_BATCH_DOCS:-24}"
      SEMANTIC_MCP_EMBED_BATCH_CHARS: "${SEMANTIC_MCP_EMBED_BATCH_CHARS:-12000}"
      SEMANTIC_MCP_MAX_CHUNK_CHARS: "${SEMANTIC_MCP_MAX_CHUNK_CHARS:-800}"
      SEMANTIC_MCP_LOG_LEVEL: "${SEMANTIC_MCP_LOG_LEVEL:-info}"
    ports:
      - "${SEMANTIC_MCP_HTTP_PORT:-8011}:${SEMANTIC_MCP_HTTP_PORT:-8011}"

volumes:
  qdrant_repo_semantic_data:
  tei_repo_semantic_cache:
