services:
  tei:
    image: ${SEMANTIC_MCP_TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:120-1.9}
    gpus: all
    command:
      - "--model-id"
      - "${SEMANTIC_MCP_TEI_MODEL_ID:-BAAI/bge-m3}"
      - "--port"
      - "80"
      - "--dtype"
      - "${SEMANTIC_MCP_TEI_DTYPE:-float16}"
      - "--max-batch-tokens"
      - "${SEMANTIC_MCP_TEI_MAX_BATCH_TOKENS:-4096}"
      - "--max-concurrent-requests"
      - "${SEMANTIC_MCP_TEI_MAX_CONCURRENT_REQUESTS:-64}"
